name: Tests

on:
  push:
    branches:
      - main
    tags-ignore:
      - '*'
    paths:
      - "src/**"
      - "tests/**"
      - ".github/workflows/test.yml"

jobs:
  tests:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v2

      - name: Setup dotnet
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'
          
      - name: Build
        run: dotnet build UI-Tweaks.sln --configuration Release

      - name: Test
        run: dotnet test --no-restore --verbosity normal